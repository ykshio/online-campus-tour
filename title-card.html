<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>タイトルカード</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, var(--color-primary-dark) 0%, var(--color-primary) 50%, var(--color-primary-light) 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    /* 大学ロゴ */
    .logo {
      height: 80px;
      animation: fadeIn 0.8s ease-out 0.2s both;
    }

    .subtitle {
      font-size: 28px;
      font-weight: 400;
      color: var(--color-accent);
      letter-spacing: 8px;
      animation: fadeIn 0.8s ease-out 0.4s both;
    }

    .title {
      font-size: 72px;
      font-weight: 900;
      color: var(--color-white);
      letter-spacing: 6px;
      line-height: 1.3;
      animation: slideInDown 0.8s ease-out 0.6s both;
    }

    .divider {
      width: 120px;
      height: 4px;
      background: var(--color-accent);
      border-radius: 2px;
      animation: expandWidth 0.6s ease-out 1.0s both;
    }

    .info {
      font-size: 24px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 4px;
      animation: fadeIn 0.8s ease-out 1.2s both;
    }

    /* 背景装飾 */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .bg-circle-1 {
      width: 600px;
      height: 600px;
      top: -100px;
      right: -100px;
    }

    .bg-circle-2 {
      width: 400px;
      height: 400px;
      bottom: -50px;
      left: -50px;
    }

    .bg-circle-3 {
      width: 300px;
      height: 300px;
      top: 50%;
      left: 10%;
      transform: translateY(-50%);
    }
  </style>
</head>
<body>
  <!-- 背景装飾 -->
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>
  <div class="bg-circle bg-circle-3"></div>

  <div class="container">
    <img class="logo" src="TDU_logo_B2白TDU.png" alt="東京電機大学">
    <div class="subtitle">TOKYO DENKI UNIVERSITY</div>
    <div class="title">オンライン<br>キャンパスツアー</div>
    <div class="divider"></div>
    <div class="info">東京電機大学 学生アンバサダー</div>
  </div>
</body>
</html>
